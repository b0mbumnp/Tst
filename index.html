<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Love - A Cinematic Experience</title>
    <style>
        /* --- Premium Typography & Core Resets --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050206;
            font-family: 'Cinzel', serif;
            position: relative;
        }

        /* --- Cinematic Loading Overlay --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0812 0%, #050206 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
        }

        .loader-heart {
            font-size: 3rem;
            color: #ff3366;
            animation: loaderPulse 1.2s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
            margin-bottom: 20px;
        }

        .loader-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes loaderPulse {
            0%, 100% { transform: scale(0.85); opacity: 0.5; filter: blur(1px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
        }

        /* --- Ambient Background & Interactive Canvas --- */
        .experience-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #1e0514 0%, #0d020a 50%, #030105 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: auto;
        }

        /* --- Glassmorphism UI Elements --- */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Top Bar: Controls & Timer */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .audio-control {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .audio-control:hover {
            background: rgba(255, 51, 102, 0.2);
            border-color: rgba(255, 51, 102, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
        }

        .countdown-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 10px 20px;
            border-radius: 12px;
            text-align: right;
            color: rgba(255, 255, 255, 0.8);
        }

        .countdown-title {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ff3366;
            margin-bottom: 4px;
        }

        .countdown-time {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* Bottom Section: Slideshow */
        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .memory-slideshow {
            background: rgba(15, 5, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 51, 102, 0.15);
            padding: 20px 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .memory-slideshow.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .memory-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #fff;
            font-size: 1.1rem;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            min-height: 54px;
        }

        /* --- Audio Warning Prompt --- */
        #interaction-prompt {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,2,6,0.8);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .prompt-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .prompt-card h2 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        .prompt-card p {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .prompt-btn {
            background: linear-gradient(45deg, #ff3366, #ff55bb);
            border: none;
            color: white;
            padding: 12px 35px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            font-size: 0.9rem;
            box-shadow: 0 5px 20px rgba(255,51,102,0.4);
            transition: transform 0.3s ease;
        }
        .prompt-btn:hover {
            transform: scale(1.05);
        }

        /* --- Mobile Responsiveness Adjustments --- */
        @media (max-width: 768px) {
            .ui-layer { padding: 15px; }
            .audio-control { padding: 8px 16px; font-size: 0.7rem; }
            .countdown-container { padding: 6px 12px; }
            .countdown-time { font-size: 0.85rem; }
            .memory-slideshow { padding: 15px 20px; }
            .memory-text { font-size: 0.95rem; min-height: 44px; }
        }
    </style>
</head>
<body>

    <!-- Interaction Prompt (Overcomes Autoplay Constraints) -->
    <div id="interaction-prompt">
        <div class="prompt-card">
            <h2>Enter Experience</h2>
            <p>For the intended cinematic audio and full interactive framework, please click below.</p>
            <button class="prompt-btn" onclick="startExperience()">Begin</button>
        </div>
    </div>

    <!-- Initialization Screen -->
    <div id="loader" style="visibility: hidden; opacity: 0;">
        <div class="loader-heart">❣</div>
        <div class="loader-text">Weaving Constellations...</div>
    </div>

    <!-- Main Scene Layout -->
    <div class="experience-container">
        <canvas id="canvas"></canvas>

        <div class="ui-layer">
            <div class="top-bar">
                <button class="audio-control interactive" id="audioBtn" onclick="toggleAudio()">Music: Off</button>
                <div class="countdown-container">
                    <div class="countdown-title">Time Shared</div>
                    <div class="countdown-time" id="timer">00d 00h 00m 00s</div>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="memory-slideshow interactive" id="slideshow">
                    <div class="memory-text" id="slideshow-text">In a universe of infinite possibilities...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Web Audio Synthesizer (Zero-dependency, premium fallback piano script) -->
    <script>
        class CinematicSynth {
            constructor() {
                this.ctx = null;
                this.playing = false;
                this.sequence = [
                    {note: "E4", duration: 1.5}, {note: "G#4", duration: 1.5}, {note: "B4", duration: 1.5}, {note: "E5", duration: 2.5},
                    {note: "B4", duration: 1.5}, {note: "G#4", duration: 1.5}, {note: "A4", duration: 1.5}, {note: "C#5", duration: 2.5},
                    {note: "E5", duration: 1.5}, {note: "A5", duration: 3.0}, {note: "F#4", duration: 1.5}, {note: "A4", duration: 1.5},
                    {note: "C#5", duration: 1.5}, {note: "F#5", duration: 2.5}, {note: "D5", duration: 1.5}, {note: "B4", duration: 3.0}
                ];
                this.frequencies = {
                    "E4": 293.66, "G#4": 415.30, "A4": 440.00, "B4": 493.88,
                    "C#5": 554.37, "D5": 587.33, "E5": 659.25, "F#5": 739.99, "A5": 880.00
                };
                this.step = 0;
                this.timerId = null;
            }
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            play() {
                if(!this.ctx) this.init();
                this.playing = true;
                this.playNext();
            }
            stop() {
                this.playing = false;
                clearTimeout(this.timerId);
            }
            playNext() {
                if (!this.playing) return;
                let item = this.sequence[this.step];
                let freq = this.frequencies[item.note];
                
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                
                // Lowpass filter simulates warm piano dampening
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0.001, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + item.duration);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + item.duration);
                
                this.step = (this.step + 1) % this.sequence.length;
                this.timerId = setTimeout(() => this.playNext(), item.duration * 800);
            }
        }

        const audioSynth = new CinematicSynth();
        let audioEnabled = false;

        function startExperience() {
            document.getElementById('interaction-prompt').style.display = 'none';
            const loader = document.getElementById('loader');
            loader.style.visibility = 'visible';
            loader.style.opacity = '1';
            
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    initMainEngine();
                }, 1500);
            }, 2000);
        }

        function toggleAudio() {
            const btn = document.getElementById('audioBtn');
            if(!audioEnabled) {
                audioSynth.play();
                btn.textContent = "Music: On";
                btn.style.background = "rgba(255, 51, 102, 0.2)";
                audioEnabled = true;
            } else {
                audioSynth.stop();
                btn.textContent = "Music: Off";
                btn.style.background = "rgba(255, 255, 255, 0.05)";
                audioEnabled = false;
            }
        }
    </script>

    <!-- Core Animation Engine (Deterministic Particle Matrix Rendering) -->
    <script>
        function initMainEngine() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Scaled high-DPI sizing configuration
            let dpr = window.devicePixelRatio || 1;
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            // Engine configuration matrix
            const phrase = "I Love You...❣️";
            const particleCount = 1400; 
            const particles = [];
            let state = 0; // 0: Streams, 1: Morphing, 2: Celebration
            let startTime = Date.now();
            const morphDelay = 4000; // 4 seconds allocation
            let cameraZoom = 1.0;
            let heartbeatProgress = 0;

            // Arrays for dynamic secondary environments
            const backgroundStars = [];
            const ambientParticles = [];
            const fireworks = [];
            const confetti = [];
            const trail = [];

            // Tracking mouse/touch trails
            window.addEventListener('mousemove', (e) => addTrail(e.clientX, e.clientY));
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) addTrail(e.touches[0].clientX, e.touches[0].clientY);
            });

            function addTrail(x, y) {
                trail.push({x, y, alpha: 1.0, size: Math.random() * 8 + 4});
                if(trail.length > 30) trail.shift();
            }

            // Initialization logic for starry sky background
            for(let i=0; i<150; i++) {
                backgroundStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    parallax: Math.random() * 0.4 + 0.1,
                    alpha: Math.random() * 0.6 + 0.4
                });
            }

            // Text engine positioning vectors 
            class TextParticle {
                constructor() {
                    this.resetStream();
                    // Randomize location along vector path upon initial loading
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                }

                resetStream() {
                    this.mode = Math.floor(Math.random() * 5); // Directions: L-R, R-L, T-B, B-T, Diagonal
                    this.speed = Math.random() * 1.5 + 0.5;
                    this.scale = Math.random() * 0.5 + 0.4; // Controlled scaling limits text clipping
                    this.alpha = Math.random() * 0.5 + 0.2;
                    this.glow = Math.floor(Math.random() * 15 + 5);
                    
                    if (this.mode === 0) { this.x = -150; this.y = Math.random() * height; this.vx = this.speed; this.vy = 0; }
                    else if (this.mode === 1) { this.x = width + 150; this.y = Math.random() * height; this.vx = -this.speed; this.vy = 0; }
                    else if (this.mode === 2) { this.x = Math.random() * width; this.y = -50; this.vx = 0; this.vy = this.speed; }
                    else if (this.mode === 3) { this.x = Math.random() * width; this.y = height + 50; this.vx = 0; this.vy = -this.speed; }
                    else { this.x = -150; this.y = Math.random() * height; this.vx = this.speed; this.vy = this.speed * 0.3; }

                    // Targets set upon State 1 morphing pipeline
                    this.tx = this.x;
                    this.ty = this.y;
                    this.morphSpeed = Math.random() * 0.03 + 0.01;
                    this.drawOrder = 0; 
                }

                update(timeElapsed) {
                    if (state === 0) {
                        this.x += this.vx;
                        this.y += this.vy;
                        
                        // Recycling bounds check
                        if (this.x < -200 || this.x > width + 200 || this.y < -100 || this.y > height + 100) {
                            this.resetStream();
                        }
                    } else {
                        // Linear interpolation toward calculated heart geometry targets
                        // Sequential Left-to-Right draw staging setup
                        if (timeElapsed > this.drawOrder) {
                            this.x += (this.tx - this.x) * this.morphSpeed;
                            this.y += (this.ty - this.y) * this.morphSpeed;
                            this.alpha += (0.85 - this.alpha) * 0.02;
                            this.scale += (0.75 - this.scale) * 0.02;
                        } else {
                            // Maintain passive stream properties until sequence triggers
                            this.x += this.vx * 0.2;
                            this.y += this.vy * 0.2;
                        }
                    }
                }

                draw() {
                    ctx.save();
                    ctx.translate(width/2, height/2);
                    ctx.scale(cameraZoom, cameraZoom);
                    ctx.translate(-width/2, -height/2);
                    
                    ctx.globalAlpha = this.alpha;
                    ctx.font = `600 ${this.scale * 16}px 'Cinzel', serif`;
                    ctx.fillStyle = `rgba(255, ${40 + this.glow * 10}, 120, ${this.alpha})`;
                    ctx.shadowBlur = this.glow;
                    ctx.shadowColor = "#ff3366";
                    
                    ctx.fillText(phrase, this.x, this.y);
                    ctx.restore();
                }
            }

            // Generate particles
            for(let i=0; i<particleCount; i++) {
                particles.push(new TextParticle());
            }

            // Heart Parametric Projection Strategy
            function computeHeartShape() {
                // Sizing modifier dynamic to system environment window parameters
                const sizeModifier = Math.min(width, height) * 0.022; 
                
                particles.forEach((p, idx) => {
                    // Normalize indexed loop over parametric system limits (-PI to PI)
                    let t = (-Math.PI) + (2 * Math.PI) * (idx / particleCount);
                    
                    // Core heart equation coordinates
                    let hx = 16 * Math.pow(Math.sin(t), 3);
                    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    // Position mappings shifted cleanly to display center
                    p.tx = (width / 2) + hx * sizeModifier;
                    p.ty = (height / 2.2) + hy * sizeModifier;
                    
                    // Calculate left-to-right drawing order distribution parameters
                    p.drawOrder = ((p.tx - (width / 2 - 200)) / 400) * 2500; 
                });
            }

            // Primary System Loop
            function loop() {
                ctx.clearRect(0, 0, width, height);
                let now = Date.now();
                let elapsed = now - startTime;

                // State Progression Controller
                if (state === 0 && elapsed > morphDelay) {
                    state = 1;
                    computeHeartShape();
                    document.getElementById('slideshow').classList.add('reveal');
                }

                if (state === 1) {
                    let complete = true;
                    particles.forEach(p => {
                        let distance = Math.hypot(p.tx - p.x, p.ty - p.y);
                        if(distance > 1.5) complete = false;
                    });
                    if (complete && elapsed > 8000) {
                        state = 2;
                    }
                }

                // Heart Beat & Lens Zoom Mechanics
                if (state === 2) {
                    heartbeatProgress += 0.05;
                    // Standard dual beat physiological simulation curve
                    let pulse = 1 + 0.06 * Math.pow(Math.sin(heartbeatProgress), 2) * Math.pow(Math.max(0, Math.sin(heartbeatProgress+0.2)), 5);
                    cameraZoom = 1 + 0.015 * Math.sin(heartbeatProgress * 0.5);
                    
                    // Transform calculations over target values directly to produce global animation behaviors
                    const sizeModifier = Math.min(width, height) * 0.022;
                    particles.forEach((p, idx) => {
                        let t = (-Math.PI) + (2 * Math.PI) * (idx / particleCount);
                        let hx = 16 * Math.pow(Math.sin(t), 3);
                        let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                        p.tx = (width / 2) + hx * sizeModifier * pulse;
                        p.ty = (height / 2.2) + hy * sizeModifier * pulse;
                        p.x = p.tx;
                        p.y = p.ty;
                    });

                    // Trigger ambient celebration arrays
                    if(Math.random() < 0.04) triggerFirework();
                    if(Math.random() < 0.15) triggerConfetti();
                }

                // Background elements rendering pipeline
                drawStars();
                
                // Active particles processing
                particles.forEach(p => {
                    p.update(elapsed - morphDelay);
                    p.draw();
                });

                // Secondary particle systems pipeline processing
                handleAmbientParticles();
                handleFireworks();
                handleConfetti();
                drawCursorTrail();

                requestAnimationFrame(loop);
            }

            // Star Rendering Realization
            function drawStars() {
                backgroundStars.forEach(s => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                    ctx.fillRect(s.x, s.y, s.size, s.size);
                    if(state === 0) s.x += s.parallax * 0.2;
                    if(s.x > width) s.x = 0;
                });
            }

            // Particles generation pipeline
            function handleAmbientParticles() {
                if(ambientParticles.length < 60 && Math.random() < 0.3) {
                    ambientParticles.push({
                        x: width/2 + (Math.random() - 0.5) * 100,
                        y: height/2 + (Math.random() - 0.5) * 100,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: -Math.random() * 1.5 - 0.5,
                        size: Math.random() * 3 + 1,
                        alpha: 1.0,
                        color: Math.random() < 0.5 ? '#ff3366' : '#ffccd5'
                    });
                }
                for(let i = ambientParticles.length - 1; i >= 0; i--) {
                    let p = ambientParticles[i];
                    p.x += p.vx; p.y += p.vy; p.alpha -= 0.008;
                    if(p.alpha <= 0) { ambientParticles.splice(i, 1); continue; }
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }

            // Fireworks Engine
            function triggerFirework() {
                let fx = Math.random() * (width * 0.6) + width * 0.2;
                let fy = Math.random() * (height * 0.4) + height * 0.1;
                let colors = ['#ff3366', '#ff88aa', '#ffaa44', '#cc44ff'];
                let chosenColor = colors[Math.floor(Math.random() * colors.length)];
                
                for(let i=0; i<40; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 3 + 2;
                    fireworks.push({
                        x: fx, y: fy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1.0, color: chosenColor, size: Math.random() * 2 + 1
                    });
                }
            }

            function handleFireworks() {
                for(let i = fireworks.length - 1; i >= 0; i--) {
                    let f = fireworks[i];
                    f.x += f.vx; f.y += f.vy; f.vy += 0.03; f.alpha -= 0.015;
                    if(f.alpha <= 0) { fireworks.splice(i, 1); continue; }
                    ctx.fillStyle = f.color;
                    ctx.globalAlpha = f.alpha;
                    ctx.fillRect(f.x, f.y, f.size, f.size);
                }
                ctx.globalAlpha = 1.0;
            }

            // Confetti Engine
            function triggerConfetti() {
                confetti.push({
                    x: Math.random() * width,
                    y: -10,
                    vx: (Math.random() - 0.5) * 3,
                    vy: Math.random() * 2 + 2,
                    size: Math.random() * 5 + 4,
                    color: `hsl(${Math.random() * 40 + 340}, 100%, 70%)`,
                    rotation: Math.random() * Math.PI,
                    rSpeed: Math.random() * 0.1 - 0.05
                });
            }

            function handleConfetti() {
                for(let i = confetti.length - 1; i >= 0; i--) {
                    let c = confetti[i];
                    c.x += c.vx; c.y += c.vy; c.rotation += c.rSpeed;
                    if(c.y > height) { confetti.splice(i, 1); continue; }
                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate(c.rotation);
                    ctx.fillStyle = c.color;
                    ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size);
                    ctx.restore();
                }
            }

            // Heart-shaped Particle Cursor Trail Rendering
            function drawCursorTrail() {
                for(let i = trail.length - 1; i >= 0; i--) {
                    let t = trail[i];
                    t.alpha -= 0.04;
                    if(t.alpha <= 0) { trail.splice(i,1); continue; }
                    ctx.save();
                    ctx.globalAlpha = t.alpha;
                    ctx.fillStyle = `rgba(255, 85, 187, ${t.alpha})`;
                    ctx.font = `${t.size}px serif`;
                    ctx.fillText('❣', t.x, t.y);
                    ctx.restore();
                }
                ctx.globalAlpha = 1.0;
            }

            // Memory Slideshow Carousel Engine
            const memories = [
                "In a universe of infinite possibilities...",
                "Across endless cosmic stars and dimensions...",
                "My heart found its true orbit near you.",
                "Every second shared is a masterpiece...",
                "Forever and always, down to the last atom. ❣"
            ];
            let slideIdx = 0;
            const slideElement = document.getElementById('slideshow-text');
            
            setInterval(() => {
                if(state > 0) {
                    slideElement.style.opacity = 0;
                    setTimeout(() => {
                        slideIdx = (slideIdx + 1) % memories.length;
                        slideElement.textContent = memories[slideIdx];
                        slideElement.style.opacity = 1;
                    }, 1000);
                }
            }, 5000);

            // Responsive Aspect Sizing Readjuster
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
                if(state === 2) computeHeartShape();
            });

            // Start Execution Engine
            loop();
        }

        // Shared Tracker Dynamic Clock Calculation Script
        const anniversary = new Date("October 14, 2023 00:00:00").getTime();
        function updateTimer() {
            const now = Date.now();
            const diff = now - anniversary;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").textContent = 
                `${String(days).padStart(2, '0')}d ${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

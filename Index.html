<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine Forever? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Poppins:wght@300;400;500;600&display=swap');

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 25%, #2a0f1f 50%, #1a0a1a 75%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            color: #fff;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Background Elements */
        #backgroundCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: radial-gradient(circle, #fff 0%, rgba(255, 255, 255, 0.2) 70%);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 200, 200, 0.6);
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Main Content Container */
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            flex-direction: column;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 0.8s ease-out 3.5s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; pointer-events: auto; }
            to { opacity: 0; pointer-events: none; }
        }

        .loading-content {
            text-align: center;
        }

        .heart-loader {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            animation: heartBeat 1.2s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
        }

        .loading-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #ff69b4;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .loading-subtext {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
            letter-spacing: 1px;
        }

        /* Heart Container */
        .heart-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 4.2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .heart-container {
                width: 280px;
                height: 280px;
                margin-bottom: 40px;
            }
        }

        /* Message Panels */
        .message-panel {
            text-align: center;
            opacity: 0;
            animation: slideInUp 0.8s ease-out 5s forwards;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .romantic-message {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            line-height: 2;
            color: rgba(255, 200, 220, 0.9);
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .romantic-message {
                font-size: 16px;
                line-height: 1.8;
            }
        }

        .proposal-text {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 50%, #ff1493 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
            margin: 30px 0;
            opacity: 0;
            animation: glowAppear 1s ease-out 5.8s forwards;
            letter-spacing: 2px;
        }

        @keyframes glowAppear {
            from {
                opacity: 0;
                filter: blur(10px);
            }
            to {
                opacity: 1;
                filter: blur(0);
            }
        }

        @media (max-width: 768px) {
            .proposal-text {
                font-size: 32px;
            }
        }

        /* Buttons */
        .button-container {
            display: flex;
            gap: 30px;
            margin-top: 40px;
            opacity: 0;
            animation: slideInUp 0.8s ease-out 6.3s forwards;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .button-container {
                gap: 15px;
            }
        }

        .btn {
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 105, 180, 0.1);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            font-family: 'Poppins', sans-serif;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.4);
            border-color: rgba(255, 105, 180, 0.8);
            background: rgba(255, 105, 180, 0.2);
        }

        .btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        @media (max-width: 768px) {
            .btn {
                padding: 14px 28px;
                font-size: 16px;
            }
        }

        /* Acceptance Screen */
        .acceptance-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            flex-direction: column;
        }

        .acceptance-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .acceptance-content {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 30px;
            border: 2px solid rgba(255, 105, 180, 0.5);
            max-width: 500px;
        }

        .acceptance-heart {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .acceptance-text {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .acceptance-subtitle {
            font-size: 18px;
            color: rgba(255, 200, 220, 0.9);
            margin-top: 20px;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .acceptance-content {
                padding: 40px 30px;
            }

            .acceptance-text {
                font-size: 32px;
            }

            .acceptance-heart {
                font-size: 60px;
            }
        }

        /* Audio Control */
        .audio-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            background: rgba(255, 105, 180, 0.2);
            border: 2px solid rgba(255, 105, 180, 0.5);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 28px;
            backdrop-filter: blur(10px);
        }

        .audio-control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
        }

        .audio-control.playing {
            background: rgba(255, 105, 180, 0.4);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
        }

        @media (max-width: 768px) {
            .audio-control {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
        }

        /* Cursor Trail */
        .cursor-trail {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            z-index: 999;
            opacity: 0.8;
            animation: trailFade 0.8s ease-out forwards;
        }

        @keyframes trailFade {
            from {
                opacity: 0.8;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.5);
            }
        }

        /* Floating Hearts */
        .floating-heart {
            position: fixed;
            pointer-events: none;
            font-size: 30px;
            z-index: 50;
            animation: float-up 4s ease-out forwards;
        }

        @keyframes float-up {
            to {
                transform: translateY(-200px) translateX(var(--x));
                opacity: 0;
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 60;
        }

        .confetti-piece {
            position: absolute;
            animation: confetti-fall 3s ease-in forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(600px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Scroll Area - Hidden */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .message-panel {
                padding: 30px 20px;
                margin-bottom: 30px;
            }

            .romantic-message {
                font-size: 14px;
            }

            .proposal-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Canvas for Stars and Effects -->
    <canvas id="backgroundCanvas"></canvas>

    <!-- Particle Canvas for Text Particles -->
    <canvas id="particleCanvas"></canvas>

    <!-- Stars Container -->
    <div class="stars" id="starsContainer"></div>

    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="loading-content">
            <div class="heart-loader">❤️</div>
            <div class="loading-text">Preparing something special...</div>
            <div class="loading-subtext">Just for you</div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Heart Container -->
        <div class="heart-container" id="heartContainer"></div>

        <!-- Message Panel -->
        <div class="message-panel">
            <div class="romantic-message">
                Every path I walked...<br>
                Every moment I lived...<br>
                Every heartbeat I felt...<br>
                <br>
                Somehow...<br>
                They all led me to You ❤️
            </div>
        </div>

        <!-- Proposal Text -->
        <div class="proposal-text">Will You Be Mine Forever? ❤️</div>

        <!-- Buttons -->
        <div class="button-container">
            <button class="btn" id="yesBtn">❤️ YES ❤️</button>
            <button class="btn" id="ofCourseBtn">🤍 OF COURSE YES 🤍</button>
        </div>
    </div>

    <!-- Acceptance Screen -->
    <div class="acceptance-screen" id="acceptanceScreen">
        <div class="acceptance-content">
            <div class="acceptance-heart">💕</div>
            <div class="acceptance-text">Best Decision Ever ❤️</div>
            <div class="acceptance-subtitle">I Promise To Make You Smile Every Day.</div>
        </div>
    </div>

    <!-- Audio Control -->
    <div class="audio-control" id="audioControl">🔊</div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            particleCount: 2000,
            animationDuration: 4000, // 4 seconds before convergence
            convergenceDuration: 2000, // 2 seconds to form heart
            particleText: 'I Love You...❣️',
            heartBeatDuration: 1500,
        };

        // ============================================
        // PARTICLE SYSTEM
        // ============================================
        class Particle {
            constructor(canvas) {
                this.canvas = canvas;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1;
                this.size = Math.random() * 0.8 + 0.6;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.glow = Math.random() * 15 + 10;
                this.directionType = Math.floor(Math.random() * 5);
                this.speed = Math.random() * 2 + 1;
                this.blur = Math.random() * 2;
                this.targetX = 0;
                this.targetY = 0;
                this.converging = false;
                this.convergenceProgress = 0;
                this.initialX = this.x;
                this.initialY = this.y;

                this.setInitialDirection();
            }

            setInitialDirection() {
                const types = [
                    () => { this.vx = this.speed; this.vy = 0; }, // Left to Right
                    () => { this.vx = -this.speed; this.vy = 0; }, // Right to Left
                    () => { this.vx = 0; this.vy = this.speed; }, // Top to Bottom
                    () => { this.vx = 0; this.vy = -this.speed; }, // Bottom to Top
                    () => { // Diagonal
                        const angle = (Math.random() * Math.PI * 2);
                        this.vx = Math.cos(angle) * this.speed;
                        this.vy = Math.sin(angle) * this.speed;
                    }
                ];
                types[this.directionType]();
            }

            update() {
                if (!this.converging) {
                    this.x += this.vx;
                    this.y += this.vy;

                    // Wrap around screen
                    if (this.x < -50) this.x = this.canvas.width + 50;
                    if (this.x > this.canvas.width + 50) this.x = -50;
                    if (this.y < -50) this.y = this.canvas.height + 50;
                    if (this.y > this.canvas.height + 50) this.y = -50;
                } else {
                    // Smooth convergence to target
                    this.convergenceProgress += 0.02;
                    const easeProgress = this.easeOutCubic(Math.min(this.convergenceProgress, 1));
                    
                    this.x = this.initialX + (this.targetX - this.initialX) * easeProgress;
                    this.y = this.initialY + (this.targetY - this.initialY) * easeProgress;
                }
            }

            easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            draw(ctx, offsetX = 0, offsetY = 0) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#FFB6D9';
                ctx.font = `${this.size * 8}px Arial`;
                ctx.filter = `blur(${this.blur}px) brightness(1.2)`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = 'rgba(255, 105, 180, 0.8)';
                ctx.fillText(CONFIG.particleText, this.x + offsetX, this.y + offsetY);
                ctx.restore();
            }
        }

        // ============================================
        // HEART SHAPE CALCULATOR
        // ============================================
        function generateHeartPoints(centerX, centerY, scale = 1) {
            const points = [];
            const heartScale = 40 * scale;

            for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = 13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle);
                
                points.push({
                    x: centerX + x * heartScale,
                    y: centerY - y * heartScale
                });
            }
            return points;
        }

        // ============================================
        // MAIN APPLICATION
        // ============================================
        class ProposalApp {
            constructor() {
                this.particleCanvas = document.getElementById('particleCanvas');
                this.particleCtx = this.particleCanvas.getContext('2d');
                this.backgroundCanvas = document.getElementById('backgroundCanvas');
                this.bgCtx = this.backgroundCanvas.getContext('2d');
                
                this.resizeCanvases();
                window.addEventListener('resize', () => this.resizeCanvases());

                this.particles = [];
                this.startTime = Date.now();
                this.convergenceStartTime = null;
                this.isConverging = false;
                this.celebrationActive = false;
                this.heartBeating = false;
                this.audioPlaying = false;

                // Initialize stars
                this.initStars();

                // Create particles
                this.createParticles();

                // Start animation loop
                this.animate();

                // Setup event listeners
                this.setupEventListeners();

                // Setup audio
                this.setupAudio();
            }

            resizeCanvases() {
                this.particleCanvas.width = window.innerWidth;
                this.particleCanvas.height = window.innerHeight;
                this.backgroundCanvas.width = window.innerWidth;
                this.backgroundCanvas.height = window.innerHeight;
            }

            createParticles() {
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    this.particles.push(new Particle(this.particleCanvas));
                }
            }

            initStars() {
                const starsContainer = document.getElementById('starsContainer');
                const starCount = Math.min(Math.floor(window.innerWidth / 20), 100);
                
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 3 + 's';
                    star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    starsContainer.appendChild(star);
                }
            }

            startConvergence() {
                this.convergenceStartTime = Date.now();
                this.isConverging = true;

                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const heartPoints = generateHeartPoints(centerX, centerY, 3);

                // Assign target positions from heart points
                for (let i = 0; i < this.particles.length; i++) {
                    const point = heartPoints[i % heartPoints.length];
                    this.particles[i].targetX = point.x;
                    this.particles[i].targetY = point.y;
                    this.particles[i].converging = true;
                    this.particles[i].initialX = this.particles[i].x;
                    this.particles[i].initialY = this.particles[i].y;
                }

                // Start heartbeat after convergence
                setTimeout(() => {
                    this.startHeartbeat();
                }, CONFIG.convergenceDuration + 500);
            }

            startHeartbeat() {
                this.heartBeating = true;
                const heartContainer = document.getElementById('heartContainer');
                heartContainer.style.animation = 'none';
                setTimeout(() => {
                    heartContainer.style.animation = '';
                }, 10);
            }

            startCelebration() {
                this.celebrationActive = true;
                
                // Confetti
                this.createConfetti();

                // Floating hearts
                this.createFloatingHearts();

                // Fireworks
                this.createFireworks();

                // Play music if available
                if (!this.audioPlaying) {
                    this.playAudio();
                }

                // Show acceptance screen
                setTimeout(() => {
                    const acceptanceScreen = document.getElementById('acceptanceScreen');
                    acceptanceScreen.classList.add('active');
                }, 500);
            }

            createConfetti() {
                const confettiCount = 100;
                for (let i = 0; i < confettiCount; i++) {
                    setTimeout(() => {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti-piece';
                        confetti.style.left = Math.random() * 100 + '%';
                        confetti.style.top = '-10px';
                        confetti.style.fontSize = Math.random() * 20 + 10 + 'px';
                        
                        const symbols = ['❤️', '💕', '💖', '✨', '🎉'];
                        confetti.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                        
                        const xOffset = (Math.random() - 0.5) * 300;
                        confetti.style.setProperty('--x', xOffset + 'px');
                        document.body.appendChild(confetti);
                        
                        setTimeout(() => confetti.remove(), 3000);
                    }, i * 30);
                }
            }

            createFloatingHearts() {
                const heartCount = 30;
                for (let i = 0; i < heartCount; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'floating-heart';
                        heart.textContent = '❤️';
                        heart.style.left = Math.random() * 100 + '%';
                        heart.style.top = '100%';
                        
                        const xOffset = (Math.random() - 0.5) * 200;
                        heart.style.setProperty('--x', xOffset + 'px');
                        document.body.appendChild(heart);
                        
                        setTimeout(() => heart.remove(), 4000);
                    }, i * 100);
                }
            }

            createFireworks() {
                const canvas = this.backgroundCanvas;
                const fireworkCount = 15;

                for (let f = 0; f < fireworkCount; f++) {
                    setTimeout(() => {
                        const startX = Math.random() * canvas.width;
                        const startY = Math.random() * canvas.height * 0.6;
                        const particleCount = 40;

                        for (let p = 0; p < particleCount; p++) {
                            const angle = (Math.PI * 2 * p) / particleCount;
                            const vx = Math.cos(angle) * (Math.random() * 6 + 4);
                            const vy = Math.sin(angle) * (Math.random() * 6 + 4);
                            
                            const particle = {
                                x: startX,
                                y: startY,
                                vx: vx,
                                vy: vy,
                                life: 1,
                                color: `hsl(${Math.random() * 60 + 300}, 100%, 60%)`
                            };

                            this.animateFireworkParticle(particle);
                        }
                    }, f * 200);
                }
            }

            animateFireworkParticle(particle) {
                const startTime = Date.now();
                const duration = 2000;

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = elapsed / duration;

                    if (progress < 1) {
                        particle.x += particle.vx;
                        particle.y += particle.vy;
                        particle.vy += 0.1; // gravity
                        particle.life = 1 - progress;

                        // Draw
                        this.bgCtx.save();
                        this.bgCtx.globalAlpha = particle.life;
                        this.bgCtx.fillStyle = particle.color;
                        this.bgCtx.fillRect(particle.x, particle.y, 4, 4);
                        this.bgCtx.restore();

                        requestAnimationFrame(animate);
                    }
                };

                animate();
            }

            setupEventListeners() {
                const yesBtn = document.getElementById('yesBtn');
                const ofCourseBtn = document.getElementById('ofCourseBtn');

                yesBtn.addEventListener('click', () => this.handleAcceptance());
                ofCourseBtn.addEventListener('click', () => this.handleAcceptance());

                // Cursor trail
                document.addEventListener('mousemove', (e) => {
                    this.createCursorTrail(e.clientX, e.clientY);
                });

                // Touch trail for mobile
                document.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    this.createCursorTrail(touch.clientX, touch.clientY);
                }, { passive: true });
            }

            createCursorTrail(x, y) {
                if (Math.random() > 0.7) return; // Reduce frequency

                const trail = document.createElement('div');
                trail.className = 'cursor-trail';
                trail.textContent = '💕';
                trail.style.left = x + 'px';
                trail.style.top = y + 'px';
                document.body.appendChild(trail);

                setTimeout(() => trail.remove(), 800);
            }

            handleAcceptance() {
                if (this.celebrationActive) return;
                this.startCelebration();
            }

            setupAudio() {
                const audioControl = document.getElementById('audioControl');
                audioControl.addEventListener('click', () => {
                    if (this.audioPlaying) {
                        this.stopAudio();
                    } else {
                        this.playAudio();
                    }
                });
            }

            playAudio() {
                // Create a simple piano melody using Web Audio API
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioContext.currentTime;

                // Piano notes for "romantic" melody
                const notes = [
                    { freq: 261.63, time: 0, duration: 0.5 }, // C
                    { freq: 329.63, time: 0.5, duration: 0.5 }, // E
                    { freq: 392.00, time: 1, duration: 0.5 }, // G
                    { freq: 523.25, time: 1.5, duration: 1 }, // C (high)
                    { freq: 392.00, time: 2.5, duration: 0.5 }, // G
                    { freq: 329.63, time: 3, duration: 0.5 }, // E
                ];

                notes.forEach(note => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();

                    osc.type = 'sine';
                    osc.frequency.value = note.freq;

                    gain.gain.setValueAtTime(0.1, now + note.time);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + note.time + note.duration);

                    osc.connect(gain);
                    gain.connect(audioContext.destination);

                    osc.start(now + note.time);
                    osc.stop(now + note.time + note.duration);
                });

                this.audioPlaying = true;
                document.getElementById('audioControl').classList.add('playing');

                setTimeout(() => {
                    this.audioPlaying = false;
                    document.getElementById('audioControl').classList.remove('playing');
                }, 4000);
            }

            stopAudio() {
                this.audioPlaying = false;
                document.getElementById('audioControl').classList.remove('playing');
            }

            animate() {
                const now = Date.now();
                const elapsed = now - this.startTime;

                // Update particles
                for (let particle of this.particles) {
                    particle.update();
                }

                // Start convergence after 4 seconds
                if (!this.isConverging && elapsed > CONFIG.animationDuration) {
                    this.startConvergence();
                }

                // Clear and draw
                this.particleCtx.clearRect(0, 0, this.particleCanvas.width, this.particleCanvas.height);

                for (let particle of this.particles) {
                    particle.draw(this.particleCtx);
                }

                // Draw heartbeat glow effect
                if (this.heartBeating) {
                    this.drawHeartbeatGlow();
                }

                requestAnimationFrame(() => this.animate());
            }

            drawHeartbeatGlow() {
                const time = (Date.now() % CONFIG.heartBeatDuration) / CONFIG.heartBeatDuration;
                const centerX = this.particleCanvas.width / 2;
                const centerY = this.particleCanvas.height / 2;

                // Create pulsing glow
                const glow = Math.sin(time * Math.PI * 2) * 0.5 + 0.5;
                const gradient = this.particleCtx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, 150
                );

                gradient.addColorStop(0, `rgba(255, 105, 180, ${glow * 0.3})`);
                gradient.addColorStop(1, `rgba(255, 105, 180, 0)`);

                this.particleCtx.fillStyle = gradient;
                this.particleCtx.fillRect(0, 0, this.particleCanvas.width, this.particleCanvas.height);
            }
        }

        // ============================================
        // INITIALIZE APP
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            new ProposalApp();
        });
    </script>
</body>
</html>
